name: Daily Telegram movement routine

on:
  schedule:
    - cron: "0 12 * * *"
      timezone: "Asia/Seoul"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: daily-telegram-routine
  cancel-in-progress: false

jobs:
  send:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Send today's routine
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python3 scripts/send_daily_routine.py

